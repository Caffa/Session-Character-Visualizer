<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pixel Office — Multi-Agent Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d14; overflow: hidden; font-family: monospace; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
const FLOOR_COLOR   = [15, 15, 25];
const GRID_COLOR    = [22, 22, 38];
const GRID_SIZE     = 48;

const AGENTS = [
  { id: 'agent-1', folder: 'web-app', color: 200, status: 'thinking', message: 'Reading App.tsx...' },
  { id: 'agent-2', folder: 'api', color: 280, status: 'editing', message: 'Writing handler.ts...' },
  { id: 'agent-3', folder: 'mobile', color: 140, status: 'running', message: 'npm build...' },
  { id: 'agent-4', folder: 'docs', color: 40, status: 'idle', message: '' },
];

const STATUS_CFG = {
  idle:     { pulse: 0.4, radius: 22, opacity: 160, label: "💤", ring: false },
  thinking: { pulse: 1.8, radius: 26, opacity: 230, label: "🧠", ring: true  },
  editing:  { pulse: 2.5, radius: 28, opacity: 255, label: "✏️", ring: true  },
  reading:  { pulse: 1.2, radius: 25, opacity: 210, label: "📖", ring: true  },
  running:  { pulse: 3.0, radius: 27, opacity: 245, label: "💻", ring: true  },
  waiting:  { pulse: 0.8, radius: 24, opacity: 200, label: "⚠️", ring: true  },
  error:    { pulse: 1.5, radius: 24, opacity: 255, label: "❌", ring: true  },
};

const DESK_POSITIONS = [
  [0.2, 0.3], [0.5, 0.3], [0.8, 0.3],
  [0.2, 0.65], [0.5, 0.65], [0.8, 0.65],
];

class Sprite {
  constructor(x, y, hue) {
    this.x = x;
    this.y = y;
    this.tx = x;
    this.ty = y;
    this.hue = hue;
    this.phase = Math.random() * Math.PI * 2;
    this.wanderOffset = { x: 0, y: 0 };
    this.wanderTarget = { x: 0, y: 0 };
    this.wanderTimer = 0;
    this.fiddlePhase = Math.random() * Math.PI * 2;
    this.blinkTimer = Math.random() * 3;
    this.isBlinking = false;
    this.currentStatus = "idle";
    this.targetStatus = "idle";
    this.statusTransition = 1.0;
  }
}

function getDeskPos(index, W, H) {
  const [nx, ny] = DESK_POSITIONS[index % DESK_POSITIONS.length];
  return [nx * W, ny * (H - 30)];
}

function drawSpeechBubble(p, x, y, text, hue, alpha) {
  if (!text) return;
  p.push();
  p.textFont('monospace');
  p.textSize(11);
  p.textAlign(p.CENTER, p.CENTER);
  const tw = p.textWidth(text);
  const bw = tw + 18;
  const bh = 22;
  const bx = x - bw / 2;
  const by = y - 72;

  p.noStroke();
  p.fill(10, 10, 20, alpha * 0.92);
  p.rect(bx, by, bw, bh, 6);

  p.stroke(p.color(`hsla(${hue}, 70%, 60%, ${alpha / 255})`));
  p.strokeWeight(1);
  p.noFill();
  p.rect(bx, by, bw, bh, 6);

  p.noStroke();
  p.fill(10, 10, 20, alpha * 0.92);
  p.triangle(x - 5, by + bh, x + 5, by + bh, x, by + bh + 8);

  p.noStroke();
  p.fill(220, 220, 255);
  p.text(text, x, by + bh / 2 + 1);
  p.pop();
}

function drawDesk(p, x, y, hue, occupied) {
  p.push();
  p.noStroke();
  const a = occupied ? 90 : 40;
  p.fill(p.color(`hsla(${hue}, 30%, 25%, ${a / 255})`));
  p.rect(x - 30, y + 16, 60, 28, 4);
  p.fill(p.color(`hsla(${hue}, 20%, 15%, ${a / 255})`));
  p.rect(x - 14, y + 6, 28, 18, 2);
  if (occupied) {
    p.fill(p.color(`hsla(${hue}, 80%, 60%, 0.12)`));
    p.rect(x - 12, y + 8, 24, 14, 2);
  }
  p.fill(p.color(`hsla(${hue}, 20%, 18%, ${a / 255})`));
  p.rect(x - 4, y + 24, 8, 6, 1);
  p.pop();
}

function drawFloor(p) {
  p.background(...FLOOR_COLOR);
  p.stroke(...GRID_COLOR);
  p.strokeWeight(1);
  for (let x = 0; x < p.width; x += GRID_SIZE) {
    p.line(x, 0, x, p.height);
  }
  for (let y = 0; y < p.height - 30; y += GRID_SIZE) {
    p.line(0, y, p.width, y);
  }
}

function drawFiddlingObject(p, sp, status, r, now, alpha) {
  const fudge = Math.sin(now * 2 + sp.fiddlePhase);
  const fudge2 = Math.cos(now * 1.5 + sp.fiddlePhase * 1.3);
  const objX = sp.x + r * 1.4 + fudge * 5;
  const objY = sp.y + r * 0.3 + fudge2 * 3;
  p.push();
  p.textSize(14);
  p.textAlign(p.CENTER, p.CENTER);
  
  switch (status) {
    case "editing":
      p.save();
      p.translate(objX + 5, objY - 5);
      p.rotate(Math.sin(now * 4) * 0.3);
      p.text("✏️", 0, 0);
      p.restore();
      break;
    case "reading":
      p.save();
      p.translate(objX, objY);
      p.scale(1, Math.sin(now * 1.2) > 0 ? 1 : -0.8);
      p.text("📖", 0, 0);
      p.restore();
      break;
    case "running":
      p.noStroke();
      p.fill(255, 255, 255, alpha * 0.3);
      for (let i = 0; i < 3; i++) {
        p.ellipse(sp.x - r * 1.5 - i * 15, sp.y + fudge2 * 4, 8 - i * 2, 3);
      }
      break;
    case "thinking":
      for (let i = 0; i < 3; i++) {
        const particlePhase = (now * 0.8 + i * 0.7 + sp.fiddlePhase) % 3;
        const py = sp.y - r * (1 + particlePhase);
        p.textSize(8 + i * 2);
        p.fill(200, 180, 255, alpha * (1 - particlePhase / 3) * 0.5);
        p.text("✨", sp.x + Math.sin(now * 2 + i) * 20, py);
      }
      break;
    case "waiting":
      p.textSize(14);
      p.fill(255, 220, 100, alpha * (0.6 + 0.4 * Math.sin(now * 3)));
      p.text("❓", objX, objY - Math.abs(Math.sin(now * 3)) * 8);
      break;
  }
  p.pop();
}

function drawNameTag(p, x, y, folder, title, hue, status) {
  p.push();
  p.textFont('monospace');
  p.textSize(10);
  p.textAlign(p.CENTER, p.CENTER);
  
  // Calculate height based on whether title exists
  const hasTitle = title && title.trim();
  const folderTw = p.textWidth(folder);
  const titleTw = hasTitle ? p.textWidth(title) : 0;
  const tw = Math.max(folderTw, titleTw);
  
  const bw = tw + 14;
  const baseBh = 16;
  const titleBh = hasTitle ? 14 : 0;
  const bh = baseBh + titleBh;
  const bx = x - bw / 2;
  const by = y + 32;

  p.noStroke();
  p.fill(10, 10, 20, 200);
  p.rect(bx, by, bw, bh, 3);

  p.fill(p.color(`hsla(${hue}, 70%, 65%, 0.9)`));
  p.text(folder, x, by + baseBh / 2 + 1);

  // Draw title below folder name (smaller, lighter)
  if (hasTitle) {
    p.fill(p.color(`hsla(${hue}, 50%, 55%, 0.8)`));
    p.textSize(8);
    p.text(title, x, by + baseBh + titleBh / 2);
  }

  const dotColors = {
    idle: [80, 80, 80], thinking: [180, 160, 255], editing: [100, 255, 150],
    reading: [100, 200, 255], running: [255, 180, 80], waiting: [255, 220, 60], error: [255, 80, 80]
  };
  const dc = dotColors[status] || [120, 120, 120];
  p.fill(...dc, 230);
  p.ellipse(bx - 6, by + baseBh / 2, 5, 5);
  p.pop();
}

new p5((p) => {
  let sprites = [];

  p.setup = () => {
    const cnv = p.createCanvas(800, 500);
    cnv.position(0, 0);
    p.pixelDensity(1);
    p.textFont('monospace');
    
    AGENTS.forEach((agent, i) => {
      const [dx, dy] = getDeskPos(i, p.width, p.height);
      sprites.push({ agent, sprite: new Sprite(dx, dy - 20, agent.color), index: i });
    });
  };

  p.draw = () => {
    drawFloor(p);
    const now = p.millis() / 1000;

    sprites.forEach(({ agent, sprite, index }) => {
      const [dx, dy] = getDeskPos(index, p.width, p.height);
      drawDesk(p, dx, dy, agent.color, agent.status !== 'idle');

      sprite.x += (dx - sprite.x) * 0.06;
      sprite.y += (dy - 20 - sprite.y) * 0.06;

      const cfg = STATUS_CFG[agent.status] || STATUS_CFG.idle;
      const pulse = Math.sin(now * cfg.pulse * Math.PI * 2 + sprite.phase);
      const r = cfg.radius + pulse * 3;
      const alpha = cfg.opacity;

      if (cfg.ring) {
        p.noFill();
        p.strokeWeight(2);
        const glowAlpha = (0.3 + 0.2 * Math.sin(now * 4 + sprite.phase)) * alpha;
        p.stroke(p.color(`hsla(${agent.color}, 80%, 65%, ${glowAlpha / 255})`));
        p.ellipse(sprite.x, sprite.y, (r + 10) * 2, (r + 10) * 2);
      }

      let bobY = Math.sin(now * 0.8 + sprite.phase) * 1.5;
      if (agent.status === 'editing') bobY = Math.abs(Math.sin(now * 5 + sprite.phase)) * 4 - 1;
      if (agent.status === 'running') bobY = Math.sin(now * 8 + sprite.phase) * 5;

      p.noStroke();
      p.fill(0, 0, 0, 60);
      p.ellipse(sprite.x + 2, sprite.y + r * 0.8 + 4, r * 1.6, r * 0.5);

      p.fill(p.color(`hsla(${agent.color}, 70%, 35%, ${(alpha * 0.6) / 255})`));
      p.ellipse(sprite.x, sprite.y + bobY, r * 2, r * 2);
      p.fill(p.color(`hsla(${agent.color}, 80%, 60%, ${alpha / 255})`));
      p.ellipse(sprite.x - r * 0.1, sprite.y + bobY - r * 0.05, r * 1.7, r * 1.7);
      p.fill(p.color(`hsla(${agent.color}, 60%, 90%, ${(alpha * 0.35) / 255})`));
      p.ellipse(sprite.x - r * 0.25, sprite.y + bobY - r * 0.3, r * 0.8, r * 0.6);

      const eyeY = sprite.y + bobY - r * 0.1;
      p.fill(255, 255, 255, alpha * 0.9);
      p.ellipse(sprite.x - r * 0.22, eyeY, 5, 6);
      p.ellipse(sprite.x + r * 0.22, eyeY, 5, 6);
      
      p.fill(10, 10, 30, alpha);
      p.ellipse(sprite.x - r * 0.22, eyeY + 1, 2.5, 3);
      p.ellipse(sprite.x + r * 0.22, eyeY + 1, 2.5, 3);

      drawFiddlingObject(p, sprite, agent.status, r, now, alpha);
      drawSpeechBubble(p, sprite.x, sprite.y + bobY, agent.message, agent.color, alpha);
      drawNameTag(p, sprite.x, sprite.y, agent.folder, agent.title, agent.color, agent.status);
    });
  };
});
</script>
</body>
</html>
