<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pixel Office — OpenCode</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d14;
      overflow: hidden;
      font-family: monospace;
    }
    canvas { display: block; }

    #status-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 28px;
      background: #111120cc;
      border-top: 1px solid #2a2a4a;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 18px;
      font-size: 11px;
      color: #555;
      backdrop-filter: blur(4px);
      z-index: 10;
    }
    #status-bar .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #f00;
      flex-shrink: 0;
    }
    #status-bar .dot.connected { background: #0f0; box-shadow: 0 0 6px #0f04; }
    #status-bar span { color: #667; }
    #status-bar .count { color: #aaa; }

    #no-agents {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #2a2a4a;
      font-size: 13px;
      gap: 10px;
      pointer-events: none;
    }
    #no-agents .big { font-size: 48px; }
    #no-agents.hidden { display: none; }
  </style>
</head>
<body>

<div id="no-agents">
  <div class="big">🏢</div>
  <div>Waiting for OpenCode sessions…</div>
  <div style="font-size:11px;color:#1e1e3a">Start a session in OpenCode to spawn an agent</div>
</div>

<div id="status-bar">
  <div class="dot" id="ws-dot"></div>
  <span id="ws-label">connecting…</span>
  <span style="margin-left:auto" class="count" id="agent-count"></span>
  <span>ws://localhost:2727/ws</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
// ─── WebSocket Client ─────────────────────────────────────────────────────────

const WS_URL = "ws://localhost:2727/ws";
let agents = {};      // id → AgentState
let ws = null;
let connected = false;
let lastSnapshotTime = 0;
let snapshotDebounceTimer = null;
const SNAPSHOT_DEBOUNCE_MS = 50;  // Min time between processing snapshots

const wsDot   = document.getElementById("ws-dot");
const wsLabel = document.getElementById("ws-label");
const agentCountEl = document.getElementById("agent-count");
const noAgents = document.getElementById("no-agents");

function connectWS() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    connected = true;
    wsDot.className = "dot connected";
    wsLabel.textContent = "connected";
  };

  ws.onclose = () => {
    connected = false;
    wsDot.className = "dot";
    wsLabel.textContent = "reconnecting…";
    setTimeout(connectWS, 2000);
  };

  ws.onerror = () => {
    // Don't call ws.close() here - let the browser handle it naturally
    // Prevents triggering reconnection loop during transient errors
  };

  ws.onmessage = (ev) => {
    try {
      const msg = JSON.parse(ev.data);
      if (msg.type === "snapshot") {
        // Debounce rapid snapshot updates
        const now = Date.now();
        if (now - lastSnapshotTime < SNAPSHOT_DEBOUNCE_MS) {
          // Clear existing timer and set new one
          if (snapshotDebounceTimer) clearTimeout(snapshotDebounceTimer);
          snapshotDebounceTimer = setTimeout(() => {
            processSnapshot(msg.agents);
          }, SNAPSHOT_DEBOUNCE_MS);
          return;
        }
        lastSnapshotTime = now;
        processSnapshot(msg.agents);
      } else if (msg.type === "serverclosing") {
        // Server is shutting down - prevent reconnect attempts
        connected = false;
        wsDot.className = "dot";
        wsLabel.textContent = "server closed";
        if (ws) ws.close();
      }
    } catch { /* ignore */ }
  };
  
  function processSnapshot(msgAgents) {
    // Merge new state, preserve visual positions from existing sprites
    const next = {};
    const now = Date.now();

    for (const a of msgAgents) {
      next[a.id] = { ...a };
    }

    // Carry over any client-side visual data and track disappearing agents
    for (const id in agents) {
      if (next[id]) {
        // Agent still exists - carry over sprite and preserve position
        if (agents[id]._sprite) {
          next[id]._sprite = agents[id]._sprite;
          // Update sprite hue in case it changed
          next[id]._sprite.hue = next[id].color;
        }
      } else {
        // Agent was removed - keep it briefly for fade-out effect
        const removedAgent = agents[id];
        if (removedAgent._sprite && !removedAgent._fadeOutStart) {
          removedAgent._fadeOutStart = now;
          next[id] = removedAgent;
        }
        // Also clean up position tracking
        removeAgentPosition(id);
      }
    }

    // Remove agents that have been fading out for more than 1 second
    for (const id in next) {
      if (next[id]._fadeOutStart && now - next[id]._fadeOutStart > 1000) {
        delete next[id];
        removeAgentPosition(id);
      }
    }

    // Clean up stale position assignments (agents that no longer exist and TTL expired)
    positionAssignments = positionAssignments.filter(id => {
      return id in agentPositions || positionSlotTTL.has(id);
    });

    agents = next;

    const allAgents = Object.values(agents);
    const mainCount = allAgents.filter(a => !a.parentID).length;
    const subCount = allAgents.filter(a => a.parentID).length;

    let countText = mainCount === 0 ? "" : `${mainCount} agent${mainCount !== 1 ? "s" : ""}`;
    if (subCount > 0) {
      countText += ` + ${subCount} subagent${subCount !== 1 ? "s" : ""}`;
    }
    agentCountEl.textContent = countText;
    noAgents.classList.toggle("hidden", allAgents.length > 0);
  }
}

connectWS();

// ─── p5.js Sketch ─────────────────────────────────────────────────────────────

const FLOOR_COLOR   = [15, 15, 25];
const GRID_COLOR    = [22, 22, 38];
const GRID_SIZE     = 48;

// Status → animation config
const STATUS_CFG = {
  idle:     { pulse: 0.4, radius: 22, opacity: 160, label: "💤", ring: false },
  thinking: { pulse: 1.8, radius: 26, opacity: 230, label: "🧠", ring: true  },
  editing:  { pulse: 2.5, radius: 28, opacity: 255, label: "✏️", ring: true  },
  reading:  { pulse: 1.2, radius: 25, opacity: 210, label: "📖", ring: true  },
  running:  { pulse: 3.0, radius: 27, opacity: 245, label: "💻", ring: true  },
  waiting:  { pulse: 0.8, radius: 24, opacity: 200, label: "⚠️", ring: true  },
  error:    { pulse: 1.5, radius: 24, opacity: 255, label: "❌", ring: true  },
};

// ── Radial positioning ─────────────────────────────────────────────────────

// Track agent positions for radial layout - with stability buffer
const agentPositions = {};  // agentId → index
let positionAssignments = [];  // track order for consistent angles
const positionSlotTTL = new Map();  // agentId → timestamp when slot expires

function easeInOutCubic(t) {
  return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

function calculateRadialPos(agentIndex, totalAgents, W, H) {
  // Center of canvas (accounting for status bar)
  const centerX = W / 2;
  const centerY = (H - 30) / 2;
  
  // Base radius - closer to center with fewer agents
  const minRadius = 80;
  const radiusPerAgent = 45;
  const maxRadius = Math.min(W, H - 30) / 2 - 60;
  const radius = Math.min(minRadius + (totalAgents * radiusPerAgent), maxRadius);
  
  // Even angular distribution
  const angleStep = (Math.PI * 2) / Math.max(totalAgents, 1);
  const angle = agentIndex * angleStep;
  
  // Calculate position
  const x = centerX + Math.cos(angle) * radius;
  const y = centerY + Math.sin(angle) * radius * 0.7;  // 0.7 for elliptical (perspective)
  
  return [x, y];
}

function getAgentPosition(id, W, H) {
  const now = Date.now();
  
  // Clean up expired position slots (keep them for 3 seconds after agent removal)
  for (const [agentId, expiry] of positionSlotTTL) {
    if (expiry < now && !positionAssignments.includes(agentId)) {
      positionSlotTTL.delete(agentId);
    }
  }
  
  // Get or assign position index
  if (!(id in agentPositions)) {
    // Check if we have a reserved slot for this agent (from recent removal)
    if (positionSlotTTL.has(id)) {
      // Find the old index from assignments (search before it was removed)
      agentPositions[id] = positionAssignments.length;
    } else {
      // New agent gets next available slot
      agentPositions[id] = positionAssignments.length;
    }
    positionAssignments.push(id);
  }
  
  const index = agentPositions[id];
  const totalAgents = positionAssignments.length;
  return calculateRadialPos(index, totalAgents, W, H);
}

function removeAgentPosition(id) {
  if (id in agentPositions) {
    const removedIndex = agentPositions[id];
    
    // Mark slot as reserved for 3 seconds (allows re-add without position jump)
    positionSlotTTL.set(id, Date.now() + 3000);
    
    // Keep the slot in assignments (just mark as inactive) instead of removing
    // This prevents all other agents from shifting positions
    delete agentPositions[id];
  }
}

// Sprite state per agent (visual only)
class Sprite {
  constructor(x, y, hue, isSubagent = false) {
    this.x = x;
    this.y = y;
    this.tx = x;    // target x
    this.ty = y;    // target y
    this.vx = 0;    // velocity x for spring physics
    this.vy = 0;    // velocity y for spring physics
    this.hue = hue;
    this.isSubagent = isSubagent;
    this.phase = Math.random() * Math.PI * 2;  // pulse phase offset
    this.walkPhase = 0;
    this.bobAmount = 0;
    this.trail = [];  // last N positions for motion blur
    
    // Status transition (smooth morph between states)
    this.currentStatus = "idle";
    this.targetStatus = "idle";
    
    // Current visual values (interpolated each frame toward target)
    this.currentPulse = 0.4;
    this.currentRadius = 22;
    this.currentAlpha = 160;
    this.currentBobSpeed = 0.8;
    
    // Target values (from STATUS_CFG)
    this.targetPulse = 0.4;
    this.targetRadius = 22;
    this.targetAlpha = 160;
    this.targetBobSpeed = 0.8;
    
    // Wandering / pacing behavior
    this.wanderOffset = { x: 0, y: 0 };
    this.wanderTarget = { x: 0, y: 0 };
    this.wanderTimer = 0;
    
    // Subagents orbit around parent
    this.orbitAngle = Math.random() * Math.PI * 2;
    this.orbitRadius = 50 + Math.random() * 30;
    this.orbitSpeed = 0.3 + Math.random() * 0.3;
    
    // Fiddling animations
    this.fiddlePhase = Math.random() * Math.PI * 2;
    this.propAngle = 0;
    this.propScale = 1;
    
    // Blinking
    this.blinkTimer = Math.random() * 3;
    this.isBlinking = false;
    
    // Expression (for error state)
    this.expression = "normal";
  }
}

function drawSpeechBubble(p, x, y, text, hue, alpha) {
  // Also check for empty or whitespace-only strings
  if (!text || !text.trim()) return;
  p.push();
  p.textSize(11);
  const tw = p.textWidth(text);
  const bw = tw + 18;
  const bh = 22;
  const bx = x - bw / 2;
  const by = y - 72;

  // bubble background
  p.noStroke();
  p.fill(10, 10, 20, alpha * 0.92);
  p.rect(bx, by, bw, bh, 6);

  // border
  p.stroke(p.color(`hsla(${hue}, 70%, 60%, ${alpha / 255})`));
  p.strokeWeight(1);
  p.noFill();
  p.rect(bx, by, bw, bh, 6);

  // tail
  p.noStroke();
  p.fill(10, 10, 20, alpha * 0.92);
  p.triangle(x - 5, by + bh, x + 5, by + bh, x, by + bh + 8);

  // text
  p.noStroke();
  p.fill(220, 220, 255, alpha);
  p.textAlign(p.CENTER, p.CENTER);
  p.text(text, x, by + bh / 2 + 1);
  p.pop();
}

// ── Subagent speech bubble (smaller) ─────────────────────────────────────

function drawSpeechBubbleSubagent(p, x, y, text, hue, alpha) {
  if (!text) return;
  p.push();
  p.textSize(9);
  const tw = p.textWidth(text);
  const bw = tw + 12;
  const bh = 16;
  const bx = x - bw / 2;
  const by = y - 45;

  // bubble background
  p.noStroke();
  p.fill(10, 10, 20, alpha * 0.92);
  p.rect(bx, by, bw, bh, 4);

  // border
  p.stroke(p.color(`hsla(${hue}, 70%, 60%, ${alpha / 255})`));
  p.strokeWeight(1);
  p.noFill();
  p.rect(bx, by, bw, bh, 4);

  // tail
  p.noStroke();
  p.fill(10, 10, 20, alpha * 0.92);
  p.triangle(x - 3, by + bh, x + 3, by + bh, x, by + bh + 5);

  // text
  p.noStroke();
  p.fill(220, 220, 255, alpha);
  p.textAlign(p.CENTER, p.CENTER);
  p.text(text, x, by + bh / 2 + 1);
  p.pop();
}

// ── Floor grid ─────────────────────────────────────────────────────────────

function drawFloor(p) {
  p.background(...FLOOR_COLOR);
  p.stroke(...GRID_COLOR);
  p.strokeWeight(1);
  for (let x = 0; x < p.width; x += GRID_SIZE) {
    p.line(x, 0, x, p.height);
  }
  for (let y = 0; y < p.height - 30; y += GRID_SIZE) {
    p.line(0, y, p.width, y);
  }
}

// ── Fiddling objects based on status ────────────────────────────────────────

function drawFiddlingObject(p, sp, status, r, now, alpha) {
  const fudge = Math.sin(now * 2 + sp.fiddlePhase);
  const fudge2 = Math.cos(now * 1.5 + sp.fiddlePhase * 1.3);
  const objX = sp.x + r * 1.4 + fudge * 5;
  const objY = sp.y + r * 0.3 + fudge2 * 3;
  p.push();
  p.textSize(14);
  p.textAlign(p.CENTER, p.CENTER);
  
  switch (status) {
    case "editing": {
      // Pencil that bounces
      p.save();
      const pencilAngle = Math.sin(now * 4) * 0.3;
      p.translate(objX + 5, objY - 5);
      p.rotate(pencilAngle);
      p.text("✏️", 0, 0);
      p.restore();
      break;
    }
    case "reading": {
      // Book that opens/closes
      const bookOpen = 0.5 + 0.5 * Math.sin(now * 1.2);
      p.save();
      p.translate(objX, objY);
      p.scale(1, bookOpen > 0.5 ? 1 : -0.8);
      p.text("📖", 0, 0);
      p.restore();
      // Glasses
      p.save();
      p.translate(sp.x, sp.y - r * 0.6);
      const glassesWobble = Math.sin(now * 0.8) * 2;
      p.textSize(10);
      p.text(`👓`, glassesWobble, 0);
      p.restore();
      break;
    }
    case "running": {
      // Motion streaks
      p.noStroke();
      p.fill(255, 255, 255, alpha * 0.3);
      for (let i = 0; i < 3; i++) {
        const streakX = sp.x - r * 1.5 - i * 15 - Math.abs(fudge) * 5;
        const streakY = sp.y + fudge2 * 4;
        p.ellipse(streakX, streakY, 8 - i * 2, 3);
      }
      break;
    }
    case "thinking": {
      // Brain particles floating up
      for (let i = 0; i < 3; i++) {
        const particlePhase = (now * 0.8 + i * 0.7 + sp.fiddlePhase) % 3;
        const px = sp.x + Math.sin(now * 2 + i) * 20;
        const py = sp.y - r * (1 + particlePhase);
        const pAlpha = alpha * (1 - particlePhase / 3) * 0.5;
        p.textSize(8 + i * 2);
        p.fill(200, 180, 255, pAlpha);
        p.text("✨", px, py);
      }
      break;
    }
    case "idle": {
      // Occasional sparkles
      if (Math.sin(now * 0.5 + sp.fiddlePhase) > 0.85) {
        p.textSize(10);
        p.fill(255, 255, 200, alpha * 0.6);
        p.text("✨", objX + Math.sin(now * 3) * 8, objY - 10);
      }
      break;
    }
    case "waiting": {
      // Question mark that bounces
      p.textSize(14);
      p.fill(255, 220, 100, alpha * (0.6 + 0.4 * Math.sin(now * 3)));
      const qmBounce = Math.abs(Math.sin(now * 3)) * 8;
      p.text("❓", objX, objY - qmBounce);
      break;
    }
    case "error": {
      // Small warning signs
      p.textSize(12);
      p.fill(255, 100, 100, alpha * (0.5 + 0.3 * Math.sin(now * 5)));
      p.text("⚡", objX + fudge * 6, objY);
      break;
    }
  }
  p.pop();
}

// ── Update status transition ─────────────────────────────────────────────────

function updateStatusTransition(sp, newStatus, deltaTime = 1/60) {
  const cfg = STATUS_CFG[newStatus] || STATUS_CFG.idle;
  
  // If status changed, update target values
  if (sp.targetStatus !== newStatus) {
    sp.currentStatus = sp.targetStatus;
    sp.targetStatus = newStatus;
    sp.targetPulse = cfg.pulse;
    sp.targetRadius = cfg.radius;
    sp.targetAlpha = cfg.opacity;
    // Bob speed based on status
    if (newStatus === "idle") sp.targetBobSpeed = 0.8;
    else if (newStatus === "editing") sp.targetBobSpeed = 3;
    else if (newStatus === "running") sp.targetBobSpeed = 5;
    else sp.targetBobSpeed = 2;
  }
  
  // Use eased lerp for smoother, more gradual transitions
  // This creates a more natural "breathing" effect during status changes
  const lerpFactor = easeInOutCubic(deltaTime * 3);  // ~0.3 seconds for full transition
  
  sp.currentPulse += (sp.targetPulse - sp.currentPulse) * lerpFactor;
  sp.currentRadius += (sp.targetRadius - sp.currentRadius) * lerpFactor;
  sp.currentAlpha += (sp.targetAlpha - sp.currentAlpha) * lerpFactor;
  sp.currentBobSpeed += (sp.targetBobSpeed - sp.currentBobSpeed) * lerpFactor;
}

// ── Update wander/pacing ───────────────────────────────────────────────────

function updateWander(sp, now) {
  sp.wanderTimer -= 1/60;
  if (sp.wanderTimer <= 0) {
    // New wander target
    sp.wanderTimer = 3 + Math.random() * 5;
    sp.wanderTarget.x = (Math.random() - 0.5) * 60;
    sp.wanderTarget.y = (Math.random() - 0.5) * 30;
  }
  
  // Smoothly move toward wander target
  sp.wanderOffset.x += (sp.wanderTarget.x - sp.wanderOffset.x) * 0.02;
  sp.wanderOffset.y += (sp.wanderTarget.y - sp.wanderOffset.y) * 0.02;
}

// ── Update blinking ───────────────────────────────────────────────────────

function updateBlinking(sp, now) {
  sp.blinkTimer -= 1/60;
  if (sp.blinkTimer <= 0) {
    sp.isBlinking = true;
    sp.blinkTimer = 0.1;  // Blink duration
  }
  if (sp.isBlinking && sp.blinkTimer <= 0) {
    sp.isBlinking = false;
    sp.blinkTimer = 2 + Math.random() * 4;  // Next blink in 2-6 seconds
  }
}

function drawNameTag(p, x, y, folder, title, hue, status) {
  p.push();
  p.textSize(10);
  p.textAlign(p.CENTER, p.CENTER);
  
  // Calculate height based on whether title exists
  const hasTitle = title && title.trim();
  const folderTw = p.textWidth(folder);
  const titleTw = hasTitle ? p.textWidth(title) : 0;
  const tw = Math.max(folderTw, titleTw);
  
  const bw = tw + 14;
  const baseBh = 16;
  const titleBh = hasTitle ? 14 : 0;
  const bh = baseBh + titleBh;
  const bx = x - bw / 2;
  const by = y + 32;

  p.noStroke();
  p.fill(10, 10, 20, 200);
  p.rect(bx, by, bw, bh, 3);

  const hsl = `hsla(${hue}, 70%, 65%, 0.9)`;
  p.fill(p.color(hsl));
  p.text(folder, x, by + baseBh / 2 + 1);

  // Draw title below folder name (smaller, lighter)
  if (hasTitle) {
    p.fill(p.color(`hsla(${hue}, 50%, 55%, 0.8)`));
    p.textSize(8);
    p.text(title, x, by + baseBh + titleBh / 2);
  }

  // small status dot
  const dotColors = {
    idle:     [80, 80, 80],
    thinking: [180, 160, 255],
    editing:  [100, 255, 150],
    reading:  [100, 200, 255],
    running:  [255, 180, 80],
    waiting:  [255, 220, 60],
    error:    [255, 80, 80],
  };
  const dc = dotColors[status] || [120, 120, 120];
  p.fill(...dc, 230);
  p.ellipse(bx - 6, by + baseBh / 2, 5, 5);
  p.pop();
}

// ── Main p5 sketch ─────────────────────────────────────────────────────────

new p5((p) => {
  p.setup = () => {
    const cnv = p.createCanvas(p.windowWidth, p.windowHeight - 28);
    cnv.position(0, 0);
    cnv.style("z-index", "1");
    p.pixelDensity(window.devicePixelRatio || 1);
    p.textFont("monospace");
  };

  p.windowResized = () => {
    p.resizeCanvas(p.windowWidth, p.windowHeight - 28);
  };

  p.draw = () => {
    // Guard against undefined or inconsistent agent state
    if (!agents) {
      drawFloor(p);
      return;
    }

    drawFloor(p);

    const now = p.millis() / 1000;
    const agentList = Object.values(agents);

    // Separate main agents from subagents
    const mainAgents = agentList.filter(agent => !agent.parentID);
    const subAgents = agentList.filter(agent => agent.parentID);

    // ── Draw main agents ───────────────────────────────────────────────────
    for (const agent of mainAgents) {
      try {
        // Calculate target position ONCE per frame (radial layout)
        let [targetX, targetY] = getAgentPosition(agent.id, p.width, p.height);

        // Ensure sprite exists
        if (!agent._sprite) {
          agent._sprite = new Sprite(targetX, targetY - 20, agent.color);
          // Initialize visual state from current status config
          const statusConfig = STATUS_CFG[agent.status] || STATUS_CFG.idle;
          agent._sprite.currentStatus = agent.status;
          agent._sprite.targetStatus = agent.status;
          agent._sprite.currentPulse = statusConfig.pulse;
          agent._sprite.currentRadius = statusConfig.radius;
          agent._sprite.currentAlpha = statusConfig.opacity;
          agent._sprite.targetPulse = statusConfig.pulse;
          agent._sprite.targetRadius = statusConfig.radius;
          agent._sprite.targetAlpha = statusConfig.opacity;
        }
        const sprite = agent._sprite;

        // Update status transition (smooth morph between states)
        updateStatusTransition(sprite, agent.status);
        
        // Update wandering/pacing behavior
        updateWander(sprite, now);
        
        // Update blinking
        updateBlinking(sprite, now);

        // Move sprite toward target + wander offset (with spring physics)
        sprite.tx = targetX + sprite.wanderOffset.x;
        sprite.ty = targetY - 20 + sprite.wanderOffset.y;
        
        // Spring physics for natural, smooth movement
        // Higher stiffness = faster response, higher damping = less oscillation
        const stiffness = 0.03;
        const damping = 0.85;
        
        const dxPos = sprite.tx - sprite.x;
        const dyPos = sprite.ty - sprite.y;
        
        sprite.vx = sprite.vx * damping + dxPos * stiffness;
        sprite.vy = sprite.vy * damping + dyPos * stiffness;
        
        sprite.x += sprite.vx;
        sprite.y += sprite.vy;

      // Use smoothly interpolated visual values (no blending between configs)
      const pulse = Math.sin(now * sprite.currentPulse * Math.PI * 2 + sprite.phase);
      const radius = sprite.currentRadius + pulse * 3;
      const alpha = sprite.currentAlpha;

      // Status-specific effects
      const isError = agent.status === "error";
      const isWaiting = agent.status === "waiting";
      
      // Nervous shake for waiting state - gentle oscillation
      const shakeX = isWaiting ? Math.sin(now * 6) * 1.5 : 0;
      const shakeY = isWaiting ? Math.cos(now * 5) * 1 : 0;
      
      // Subtle vibration for error state - reduced frequency for elegance
      const vibrateX = isError ? Math.sin(now * 12) * 1 : 0;
      
      const drawX = sprite.x + shakeX + vibrateX;
      const drawY = sprite.y + shakeY;

      // Glow ring for active states
      const currentStatusConfig = STATUS_CFG[agent.status] || STATUS_CFG.idle;
      if (currentStatusConfig.ring) {
        p.noFill();
        p.strokeWeight(2);
        
        // Different ring styles based on status (smoothed)
        let ringPulse = now * 2.5;
        if (agent.status === "thinking") ringPulse = now * 1;  // Slow, expanding
        if (agent.status === "editing") ringPulse = now * 4;   // Energetic
        if (agent.status === "waiting") ringPulse = now * 2;  // Moderate
        
        const glowAlpha = (0.3 + 0.2 * Math.sin(ringPulse + sprite.phase)) * alpha;
        p.stroke(p.color(`hsla(${agent.color}, 80%, 65%, ${glowAlpha / 255})`));
        p.ellipse(drawX, drawY, (radius + 10) * 2, (radius + 10) * 2);
        p.strokeWeight(1);
        p.stroke(p.color(`hsla(${agent.color}, 60%, 80%, ${glowAlpha * 0.5 / 255})`));
        p.ellipse(drawX, drawY, (radius + 18) * 2, (radius + 18) * 2);
      }

      // Bob / walk animation - use interpolated bob speed for smooth transitions
      // Map status to base amplitude for consistent motion
      let bobAmplitude = 2;
      if (agent.status === "editing") bobAmplitude = 3;
      else if (agent.status === "running") bobAmplitude = 4;
      
      // Use interpolated bob speed for smooth transitions between states
      let bobY = Math.sin(now * sprite.currentBobSpeed + sprite.phase) * bobAmplitude;

      // Main blob body
      p.noStroke();
      // Shadow (affected by wander)
      p.fill(0, 0, 0, 60);
      p.ellipse(drawX + 2 + sprite.wanderOffset.x * 0.3, drawY + radius * 0.8 + 4, radius * 1.6, radius * 0.5);

      // Body gradient simulation - add red tint for error state
      const bodyHue = isError ? (agent.color + 20) % 360 : agent.color;
      p.fill(p.color(`hsla(${bodyHue}, 70%, 35%, ${(alpha * 0.6) / 255})`));
      p.ellipse(drawX, drawY + bobY, radius * 2, radius * 2);
      p.fill(p.color(`hsla(${bodyHue}, 80%, 60%, ${alpha / 255})`));
      p.ellipse(drawX - radius * 0.1, drawY + bobY - radius * 0.05, radius * 1.7, radius * 1.7);
      
      // Red pulse for error
      if (isError) {
        p.fill(255, 80, 80, alpha * 0.15 * (0.5 + 0.5 * Math.sin(now * 5)));
        p.ellipse(drawX, drawY + bobY, radius * 2.2, radius * 2.2);
      }
      
      // Highlight
      p.fill(p.color(`hsla(${bodyHue}, 60%, 90%, ${(alpha * 0.35) / 255})`));
      p.ellipse(drawX - radius * 0.25, drawY + bobY - radius * 0.3, radius * 0.8, radius * 0.6);

      // Eyes
      const eyeY = drawY + bobY - radius * 0.1;
      
      if (sprite.isBlinking) {
        // Closed eyes (horizontal line)
        p.stroke(10, 10, 30, alpha);
        p.strokeWeight(2);
        p.line(drawX - radius * 0.35, eyeY, drawX - radius * 0.1, eyeY);
        p.line(drawX + radius * 0.1, eyeY, drawX + radius * 0.35, eyeY);
        p.noStroke();
      } else {
        // Open eyes
        p.fill(255, 255, 255, alpha * 0.9);
        p.ellipse(drawX - radius * 0.22, eyeY, 5, 6);
        p.ellipse(drawX + radius * 0.22, eyeY, 5, 6);
        
        // Pupils - status specific movement
        let pupilShift = 0;
        let pupilV = 1;
        
        if (agent.status === "thinking") {
          pupilShift = Math.sin(now * 3) * 1.5;  // Side to side
          pupilV = 0;  // Look up slightly
        } else if (agent.status === "reading") {
          pupilShift = Math.sin(now * 0.5) * 0.5;  // Subtle movement
          pupilV = 0.5;
        } else if (agent.status === "running") {
          pupilShift = Math.sin(now * 10) * 1;  // Fast darting
        } else if (agent.status === "waiting") {
          pupilShift = Math.sin(now * 2) * 1;  // Looking around nervously
        }
        
        p.fill(10, 10, 30, alpha);
        p.ellipse(drawX - radius * 0.22 + pupilShift, eyeY + pupilV, 2.5, 3);
        p.ellipse(drawX + radius * 0.22 + pupilShift, eyeY + pupilV, 2.5, 3);
        
        // Error expression (X_X eyes)
        if (isError) {
          p.stroke(10, 10, 30, alpha);
          p.strokeWeight(1.5);
          // X eyes
          const ex1 = drawX - radius * 0.22, ey1 = eyeY - 1;
          const ex2 = drawX + radius * 0.22, ey2 = eyeY - 1;
          const es = 2.5;
          p.line(ex1 - es, ey1 - es, ex1 + es, ey1 + es);
          p.line(ex1 - es, ey1 + es, ex1 + es, ey1 - es);
          p.line(ex2 - es, ey2 - es, ex2 + es, ey2 + es);
          p.line(ex2 - es, ey2 + es, ex2 + es, ey2 - es);
          p.noStroke();
        }
      }

      // Fiddling objects based on status
      drawFiddlingObject(p, sprite, agent.status, radius, now, alpha);

      // Speech bubble
      drawSpeechBubble(p, drawX, drawY + bobY, agent.message, agent.color, alpha);

      // Name tag
      drawNameTag(p, drawX, drawY, agent.folder, agent.title, agent.color, agent.status);
      } catch {
        // Skip this agent if rendering fails - prevents freeze on disconnect
      }
    }

    // ── Draw subagents (smaller, orbiting around parent) ────────────────────
    for (const subagent of subAgents) {
      try {
        // Find parent agent to orbit around
        const parent = agents[subagent.parentID];
        if (!parent || !parent._sprite) continue;

        const parentSprite = parent._sprite;
        // Use parent's TARGET position (tx, ty) for stable orbit center
        // This prevents compounded motion when parent is lerping
        const orbitCenterX = parentSprite.tx;
        const orbitCenterY = parentSprite.ty;
        const isSubagent = true;
        const isIdle = subagent.status === "idle";

        // Subagent color is based on parent's hue + offset
        const subagentHue = (parent.color + 30) % 360;
        const saturation = 65;
        const lightness = 55;

        // Ensure sprite exists with subagent flag
        if (!subagent._sprite) {
          subagent._sprite = new Sprite(parentSprite.x, parentSprite.y, subagentHue, true);
          // Initialize visual state from current status config
          const statusConfig = STATUS_CFG[subagent.status] || STATUS_CFG.idle;
          subagent._sprite.currentStatus = subagent.status;
          subagent._sprite.targetStatus = subagent.status;
          subagent._sprite.currentPulse = statusConfig.pulse;
          subagent._sprite.currentRadius = statusConfig.radius * 0.6;  // 60% of main agent size
          subagent._sprite.currentAlpha = statusConfig.opacity;
          subagent._sprite.targetPulse = statusConfig.pulse;
          subagent._sprite.targetRadius = statusConfig.radius * 0.6;
          subagent._sprite.targetAlpha = statusConfig.opacity;
        }
        const sprite = subagent._sprite;
        sprite.isSubagent = true;

        // Update status transition
        updateStatusTransition(sprite, subagent.status);
        updateBlinking(sprite, now);

        // Calculate fade out if agent is being removed
        let fadeAlpha = 1.0;
        if (subagent._fadeOutStart) {
          const fadeProgress = (Date.now() - subagent._fadeOutStart) / 1000;
          fadeAlpha = 1.0 - fadeProgress;
          if (fadeAlpha < 0) fadeAlpha = 0;
        }

        // Update orbit position around parent
        sprite.orbitAngle += sprite.orbitSpeed * 0.5 * (1/60);  // Consistent speed
        const orbitOffsetX = Math.cos(sprite.orbitAngle) * sprite.orbitRadius;
        const orbitOffsetY = Math.sin(sprite.orbitAngle * 0.7) * sprite.orbitRadius * 0.4 + 15;

        // Use interpolated visual values for smooth transitions
        const pulse = Math.sin(now * sprite.currentPulse + sprite.phase);
        const radius = sprite.currentRadius + pulse * 2;
        const alpha = sprite.currentAlpha * fadeAlpha;
        const bobY = Math.sin(now * sprite.currentBobSpeed * 0.5 + sprite.phase) * 2;

        // Calculate draw position using stable orbit center
        const drawX = orbitCenterX + orbitOffsetX;
        const drawY = orbitCenterY + orbitOffsetY + bobY;

        // Draw connecting line to parent (subtle)
        const lineAlpha = 30 * (alpha / 255);  // Scale with current alpha
        p.stroke(subagentHue, 60, 50, lineAlpha * fadeAlpha);
        p.strokeWeight(1);
        p.line(orbitCenterX, orbitCenterY - 10, drawX, drawY - radius);
        p.noStroke();

        // Shadow
        p.fill(0, 0, 0, 40 * fadeAlpha);
        p.ellipse(drawX + 1, drawY + radius * 0.6 + 2, radius * 1.4, radius * 0.4);

        // Body - rounded rectangle for subagents (different from main agents' ellipse)
        p.fill(p.color(`hsla(${subagentHue}, ${saturation}%, ${lightness - 15}%, ${(alpha * 0.7) / 255})`));
        p.rectMode(p.CENTER);
        p.rect(drawX, drawY, radius * 1.8, radius * 1.6, radius * 0.5);
        p.fill(p.color(`hsla(${subagentHue}, ${saturation + 5}%, ${lightness}%, ${alpha / 255})`));
        p.rect(drawX - radius * 0.1, drawY - radius * 0.1, radius * 1.5, radius * 1.3, radius * 0.4);
        p.rectMode(p.CORNER);

        // Highlight
        const highlightAlpha = 0.3 * (alpha / 255);
        p.fill(p.color(`hsla(${subagentHue}, 50%, 85%, ${highlightAlpha * fadeAlpha})`));
        p.ellipse(drawX - radius * 0.3, drawY - radius * 0.35, radius * 0.5, radius * 0.4);

        // Eyes - smaller for subagent
        const eyeY = drawY - radius * 0.1;
        const eyeSize = 3;
        const eyeAlpha = alpha;
        if (sprite.isBlinking) {
          p.stroke(10, 10, 30, eyeAlpha);
          p.strokeWeight(1.5);
          p.line(drawX - radius * 0.3, eyeY, drawX - radius * 0.1, eyeY);
          p.line(drawX + radius * 0.1, eyeY, drawX + radius * 0.3, eyeY);
          p.noStroke();
        } else {
          p.fill(255, 255, 255, eyeAlpha * 0.9);
          p.ellipse(drawX - radius * 0.2, eyeY, eyeSize + 1, eyeSize + 2);
          p.ellipse(drawX + radius * 0.2, eyeY, eyeSize + 1, eyeSize + 2);
          p.fill(10, 10, 30, eyeAlpha);
          p.ellipse(drawX - radius * 0.2, eyeY, 2, 2.5);
          p.ellipse(drawX + radius * 0.2, eyeY, 2, 2.5);
        }

        // Speech bubble (smaller for subagent)
        drawSpeechBubbleSubagent(p, drawX, drawY + bobY, subagent.message, subagentHue, alpha);
      } catch {
        // Skip this subagent if rendering fails - prevents freeze on disconnect
      }
    }

    // ── Empty office hint ──────────────────────────────────────────────────
    if (agentList.length === 0 && !connected) {
      p.push();
      p.fill(30, 30, 60, 200);
      p.noStroke();
      p.textSize(12);
      p.textAlign(p.CENTER);
      p.text("⚡ Waiting for plugin…", p.width / 2, p.height / 2 + 80);
      p.pop();
    }
  };
});
</script>
